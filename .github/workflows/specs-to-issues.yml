name: Specs to Issues Automation (Bidirectional Sync)

# NOTE: Checkbox marks in spec files drive BOTH:
# 1) status LABEL on the issue, and
# 2) issue open/closed state.
#
# Rules:
#   All [ ] → status/backlog, issue open
#   Mix of [ ] and others → status/in-progress, issue open
#   All [X] or filled → status/completed, issue closed
#
# Checkboxes in the "Checkbox Status Legend" section are ignored.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/specs/**/*.md'
  workflow_run:
    workflows:
      - Build APK
    types:
      - completed
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - create-issues-only
          - sync-status-only
          - regenerate-context

jobs:
  sync-specs-to-issues:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Parse specs and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/specs_to_issues.py

      - name: Update issue labels and status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/update_issue_status.py

      - name: Sync checkbox status from specs to issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/sync_spec_status.py

      - name: Generate copilot-readable issue context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/generate_issue_context.py

      - name: Prepare issue summary for copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/prepare_copilot_context.py

      - name: Sync issue open/closed state from specs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/close_completed_issues.py

      - name: Generate documentation summary
        run: |
          python .github/scripts/generate_docs_summary.py

      - name: Commit updated docs/readme.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/readme.md
          if git diff --cached --quiet; then
            echo "📄 docs/readme.md is already up to date, nothing to commit."
          else
            git commit -m "docs: regenerate docs/readme.md summary [skip ci]"
            git push
          fi
