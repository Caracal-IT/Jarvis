name: Specs to Issues Automation (Bidirectional Sync)

# NOTE: Checkbox marks in spec files DO NOT determine if issues are open/closed.
# They only affect the status LABEL on the issue.
# Issues remain open until manually closed.
#
# Status Label Mapping:
#   All [ ] → status/backlog
#   Mix of [ ] and others → status/in-progress
#   All [X] or filled → status/completed

on:
  push:
    branches:
      - main
    paths:
      - 'docs/specs/**/*.md'
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - create-issues-only
          - sync-status-only
          - regenerate-context

jobs:
  sync-specs-to-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Parse specs and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/specs_to_issues.py

      - name: Update issue labels and status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/update_issue_status.py

      - name: Sync checkbox status from specs to issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/sync_spec_status.py

      - name: Generate copilot-readable issue context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/generate_issue_context.py

      - name: Prepare issue summary for copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/prepare_copilot_context.py

