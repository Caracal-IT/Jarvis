name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run lint (release)
        run: ./gradlew :app:lintRelease --stacktrace
        continue-on-error: true

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Collect release artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts/release

          # AGP output names can vary (for example app-release-unsigned.apk).
          mapfile -t apk_files < <(find app/build/outputs/apk/release -type f -name "*.apk" | sort)
          if [ ${#apk_files[@]} -eq 0 ]; then
            echo "No APK files were generated under app/build/outputs/apk/release"
            exit 1
          fi

          for apk in "${apk_files[@]}"; do
            cp "$apk" artifacts/release/
          done

          if [ -f .github/how-to-install-apk.md ]; then
            cp .github/how-to-install-apk.md artifacts/release/
          fi

      - name: Upload release build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-artifacts
          path: artifacts/release
          retention-days: 30

      - name: Report build status
        if: always()
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Files" >> $GITHUB_STEP_SUMMARY
          if [ -d artifacts/release ]; then
            ls -1 artifacts/release | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "- No artifacts directory found" >> $GITHUB_STEP_SUMMARY
          fi
